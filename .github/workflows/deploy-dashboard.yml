# Publish dashboard/app to GitHub Pages (static build; HashRouter + relative base).
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/app/**"
      - "dashboard/extracts/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/app/package-lock.json

      - name: Install and build
        run: |
          cd dashboard/app
          npm ci
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/app/dist

  deploy:
    # Display name in the repo "Deployments" sidebar (deploy-pages allows custom names; default is github-pages).
    environment:
      name: Dashboard
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
